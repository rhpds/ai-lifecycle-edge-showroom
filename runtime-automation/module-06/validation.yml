---
# Module 6: Test alerts - Validation
- name: Validate Module 6
  hosts: localhost
  gather_facts: false
  vars:
    bastion_user: "{{ lookup('env', 'bastion_ssh_user_name') | default('lab-user', true) }}"
    bastion_host: "{{ lookup('env', 'bastion_public_hostname') }}"
    bastion_port: "{{ lookup('env', 'bastion_ssh_port') }}"
    bastion_password: "{{ lookup('env', 'bastion_ssh_password') }}"
    microshift_ssh_key: "/home/{{ bastion_user }}/.ssh/microshift-001"
    microshift_vm: "cloud-user@vmi/microshift"
    microshift_namespace: "microshift-001"
    apps_domain: "{{ lookup('env', 'openshift_cluster_ingress_domain') }}"

  tasks:
    - name: "✓ Check BMS dashboard pod is running in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get pods -n battery-demo -l app=bms-dashboard --no-headers 2>/dev/null | grep Running | wc -l'"
      register: r_bms_pod
      failed_when: false

    - validation_check:
        check: "{{ r_bms_pod.rc == 0 and (r_bms_pod.stdout | int) >= 1 }}"
        pass_msg: "✅ BMS dashboard pod is running in MicroShift ({{ r_bms_pod.stdout | default('0') }} pods)"
        error_msg: "❌ BMS dashboard not running in MicroShift"

    - name: "⚠️ Manual: Test BMS dashboard and alerts"
      ansible.builtin.debug:
        msg: |
          ⚠️ MANUAL STEPS:
            1. Access BMS dashboard: https://bms-dashboard-microshift-001.{{ apps_domain }}
            2. Review Alerts panel (stress detection + time-to-failure predictions)
            3. Use Actions panel to trigger manual inference
            4. Simulate temperature anomalies
            5. Verify telemetry charts show live updates
            6. Confirm AI predictions display correctly

    - name: "✅ Module 6 validation summary"
      ansible.builtin.debug:
        msg: |
          Module 6 Validation Complete
          =============================
          ✅ BMS dashboard infrastructure running in MicroShift
          ⚠️  Manual browser testing required

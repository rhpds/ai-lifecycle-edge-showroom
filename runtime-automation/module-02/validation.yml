---
# Module 2: Red Hat OpenShift AI configuration - Validation
- name: Validate Module 2
  hosts: localhost
  gather_facts: false
  vars:
    apps_domain: "{{ lookup('env', 'openshift_cluster_ingress_domain') }}"

  tasks:
    # ========================================
    # Exercise 2.1: Access RHOAI Dashboard
    # ========================================
    - name: "✓ Check RHOAI operator is installed"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: apps/v1
        kind: Deployment
        name: rhods-operator
        namespace: redhat-ods-operator
      register: r_rhoai_operator
      failed_when: false

    - name: "✓ Check DataScienceCluster exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: datasciencecluster.opendatahub.io/v1
        kind: DataScienceCluster
      register: r_dsc
      failed_when: false

    # ========================================
    # Exercise 2.2: Review data science project
    # ========================================
    - name: "✓ Check ai-edge-project namespace exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: v1
        kind: Namespace
        name: ai-edge-project
      register: r_project_ns
      failed_when: false

    - name: "✓ Check DSPApplication exists in ai-edge-project"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: datasciencepipelinesapplications.opendatahub.io/v1
        kind: DataSciencePipelinesApplication
        namespace: ai-edge-project
      register: r_dsp
      failed_when: false

    # ========================================
    # Exercise 2.3: Review data connection
    # ========================================
    - name: "✓ Check vehicle-models Secret exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: v1
        kind: Secret
        name: vehicle-models
        namespace: ai-edge-project
      register: r_dataconn
      failed_when: false

    - name: "✓ Validate S3 credentials in vehicle-models Secret"
      ansible.builtin.set_fact:
        s3_endpoint: "{{ r_dataconn.resources[0].data.AWS_S3_ENDPOINT | b64decode }}"
        s3_bucket: "{{ r_dataconn.resources[0].data.AWS_S3_BUCKET | b64decode }}"
        s3_access_key: "{{ r_dataconn.resources[0].data.AWS_ACCESS_KEY_ID | b64decode }}"
      when: r_dataconn.resources | length > 0
      failed_when: false

    # ========================================
    # Collect all check results
    # ========================================
    - name: Collect all validation results
      ansible.builtin.set_fact:
        _task1_ok: "{{ (r_rhoai_operator.resources | length > 0) and (r_rhoai_operator.resources[0].status.readyReplicas | default(0) > 0) }}"
        _task2_ok: "{{ r_dsc.resources | length > 0 }}"
        _task3_ok: "{{ r_project_ns.resources | length > 0 }}"
        _task4_ok: "{{ r_dsp.resources | length > 0 }}"
        _task5_ok: "{{ r_dataconn.resources | length > 0 }}"
        _task6_ok: "{{ (r_dataconn.resources | length > 0) and (s3_bucket | default('') == 'inference') }}"
        _task7_ok: "{{ (r_dataconn.resources | length > 0) and ('microshift' in (s3_endpoint | default(''))) }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok and _task3_ok and _task4_ok and _task5_ok and _task6_ok and _task7_ok }}"
        pass_msg: |
          ✅ Exercise 2.1: RHOAI operator is installed and running
          ✅ Exercise 2.1: DataScienceCluster is configured
          ✅ Exercise 2.2: ai-edge-project namespace exists
          ✅ Exercise 2.2: Data Science Pipelines configured ({{ r_dsp.resources | length }} pipeline(s))
          ✅ Exercise 2.3: vehicle-models data connection Secret exists
          ✅ Exercise 2.3: vehicle-models points to 'inference' bucket
          ✅ Exercise 2.3: vehicle-models connects to MicroShift MinIO ({{ s3_endpoint | default('unknown') }})

          ⚠️ Note: Manual verification required for:
            - RHOAI Dashboard access (https://data-science-gateway.{{ apps_domain }})
            - Project dashboard navigation
            - Data connection UI review
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Exercise 2.1: RHOAI operator is installed and running
          {{ '✅' if _task2_ok else '❌' }} Exercise 2.1: DataScienceCluster is configured
          {{ '✅' if _task3_ok else '❌' }} Exercise 2.2: ai-edge-project namespace exists
          {{ '✅' if _task4_ok else '❌' }} Exercise 2.2: Data Science Pipelines configured
          {{ '✅' if _task5_ok else '❌' }} Exercise 2.3: vehicle-models Secret exists
          {{ '✅' if _task6_ok else '❌' }} Exercise 2.3: vehicle-models bucket correct (expected: inference, found: {{ s3_bucket | default('missing') }})
          {{ '✅' if _task7_ok else '❌' }} Exercise 2.3: vehicle-models endpoint correct (expected: microshift, found: {{ s3_endpoint | default('missing') }})

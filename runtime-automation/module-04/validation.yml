---
# Module 4: Model serving - Validation
- name: Validate Module 4
  hosts: localhost
  gather_facts: false
  tasks:
    # ========================================
    # Exercise 4.1: Deploy Stress Detection model server
    # ========================================
    - name: "✓ Check Stress Detection ServingRuntime exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: serving.kserve.io/v1alpha1
        kind: ServingRuntime
        name: stress-detection
        namespace: ai-edge-project
      register: r_stress_runtime
      failed_when: false

    - name: "✓ Check Stress Detection InferenceService exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: serving.kserve.io/v1beta1
        kind: InferenceService
        name: stress-detection
        namespace: ai-edge-project
      register: r_stress_svc
      failed_when: false

    - name: "✓ Check Stress Detection predictor pod is running"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: ai-edge-project
        label_selectors:
          - serving.kserve.io/inferenceservice=stress-detection
      register: r_stress_pod
      failed_when: false

    - name: "✓ Check Stress Detection service endpoint exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Service
        name: stress-detection-predictor
        namespace: ai-edge-project
      register: r_stress_service
      failed_when: false

    # ========================================
    # Exercise 4.2: Deploy Time to Failure model server
    # ========================================
    - name: "✓ Check Time to Failure ServingRuntime exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: serving.kserve.io/v1alpha1
        kind: ServingRuntime
        name: time-to-failure
        namespace: ai-edge-project
      register: r_ttf_runtime
      failed_when: false

    - name: "✓ Check Time to Failure InferenceService exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: serving.kserve.io/v1beta1
        kind: InferenceService
        name: time-to-failure
        namespace: ai-edge-project
      register: r_ttf_svc
      failed_when: false

    - name: "✓ Check Time to Failure predictor pod is running"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: ai-edge-project
        label_selectors:
          - serving.kserve.io/inferenceservice=time-to-failure
      register: r_ttf_pod
      failed_when: false

    - name: "✓ Check Time to Failure service endpoint exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Service
        name: time-to-failure-predictor
        namespace: ai-edge-project
      register: r_ttf_service
      failed_when: false

    # ========================================
    # Collect all check results
    # ========================================
    - name: Collect all validation results
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_stress_runtime.resources | length > 0 }}"
        _task2_ok: "{{ (r_stress_svc.resources | length > 0) and (r_stress_svc.resources[0].status is defined) and (r_stress_svc.resources[0].status.conditions is defined) and (r_stress_svc.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0) }}"
        _task3_ok: "{{ (r_stress_pod.resources | length > 0) and (r_stress_pod.resources[0].status.phase | default('') == 'Running') }}"
        _task4_ok: "{{ r_stress_service.resources | length > 0 }}"
        _task5_ok: "{{ r_ttf_runtime.resources | length > 0 }}"
        _task6_ok: "{{ (r_ttf_svc.resources | length > 0) and (r_ttf_svc.resources[0].status is defined) and (r_ttf_svc.resources[0].status.conditions is defined) and (r_ttf_svc.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0) }}"
        _task7_ok: "{{ (r_ttf_pod.resources | length > 0) and (r_ttf_pod.resources[0].status.phase | default('') == 'Running') }}"
        _task8_ok: "{{ r_ttf_service.resources | length > 0 }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok and _task3_ok and _task4_ok and _task5_ok and _task6_ok and _task7_ok and _task8_ok }}"
        pass_msg: |
          ✅ Exercise 4.1: Stress Detection ServingRuntime exists
          ✅ Exercise 4.1: Stress Detection InferenceService is Ready
          ✅ Exercise 4.1: Stress Detection predictor pod is Running
          ✅ Exercise 4.1: Stress Detection service endpoint exists ({{ r_stress_service.resources[0].spec.clusterIP if r_stress_service.resources | length > 0 else 'N/A' }})
          ✅ Exercise 4.2: Time to Failure ServingRuntime exists
          ✅ Exercise 4.2: Time to Failure InferenceService is Ready
          ✅ Exercise 4.2: Time to Failure predictor pod is Running
          ✅ Exercise 4.2: Time to Failure service endpoint exists ({{ r_ttf_service.resources[0].spec.clusterIP if r_ttf_service.resources | length > 0 else 'N/A' }})

          ⚠️ Note: Manual verification required for:
            - Exercise 4.3: Query model endpoints using query_models.ipynb notebook
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Exercise 4.1: Stress Detection ServingRuntime exists
          {{ '✅' if _task2_ok else '❌' }} Exercise 4.1: Stress Detection InferenceService is Ready
          {{ '✅' if _task3_ok else '❌' }} Exercise 4.1: Stress Detection predictor pod is Running (phase: {{ r_stress_pod.resources[0].status.phase | default('missing') if r_stress_pod.resources | length > 0 else 'pod not found' }})
          {{ '✅' if _task4_ok else '❌' }} Exercise 4.1: Stress Detection service endpoint exists
          {{ '✅' if _task5_ok else '❌' }} Exercise 4.2: Time to Failure ServingRuntime exists
          {{ '✅' if _task6_ok else '❌' }} Exercise 4.2: Time to Failure InferenceService is Ready
          {{ '✅' if _task7_ok else '❌' }} Exercise 4.2: Time to Failure predictor pod is Running (phase: {{ r_ttf_pod.resources[0].status.phase | default('missing') if r_ttf_pod.resources | length > 0 else 'pod not found' }})
          {{ '✅' if _task8_ok else '❌' }} Exercise 4.2: Time to Failure service endpoint exists

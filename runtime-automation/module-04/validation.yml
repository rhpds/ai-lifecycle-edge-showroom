---
# Module 4: Model serving - Validation
- name: Validate Module 4
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "✓ Check Stress Detection InferenceService exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: serving.kserve.io/v1beta1
        kind: InferenceService
        name: stress-detection
        namespace: ai-edge-project
      register: r_stress_svc
      failed_when: false

    - name: "✓ Check Time to Failure InferenceService exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: serving.kserve.io/v1beta1
        kind: InferenceService
        name: time-to-failure
        namespace: ai-edge-project
      register: r_ttf_svc
      failed_when: false

    # ========================================
    # Collect all check results
    # ========================================
    - name: Collect all validation results
      ansible.builtin.set_fact:
        _task1_ok: "{{ (r_stress_svc.resources | length > 0) and (r_stress_svc.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0) }}"
        _task2_ok: "{{ (r_ttf_svc.resources | length > 0) and (r_ttf_svc.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0) }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok }}"
        pass_msg: |
          ✅ Exercise 4: Stress Detection model server is deployed and ready
          ✅ Exercise 4: Time to Failure model server is deployed and ready

          ⚠️ Note: Manual steps required for:
            - Deploy model servers via RHOAI Dashboard
            - Test model endpoints with prediction queries
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Exercise 4: Stress Detection model server is ready
          {{ '✅' if _task2_ok else '❌' }} Exercise 4: Time to Failure model server is ready

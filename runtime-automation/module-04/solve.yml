---
# Module 4: Model serving - Solve
- name: Solve Module 4
  hosts: localhost
  gather_facts: false
  tasks:
    # ========================================
    # Get hardware profile resourceVersion
    # ========================================
    - name: "Get default hardware profile resourceVersion"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: infrastructure.opendatahub.io/v1
        kind: HardwareProfile
        name: default-profile
        namespace: redhat-ods-applications
      register: r_hw_profile
      failed_when: false

    - name: "Set hardware profile resourceVersion"
      ansible.builtin.set_fact:
        hw_profile_resource_version: "{{ r_hw_profile.resources[0].metadata.resourceVersion if r_hw_profile.resources | length > 0 else '' }}"

    # ========================================
    # Exercise 4.1: Deploy Stress Detection model server
    # ========================================
    - name: "Exercise 4.1: Create OpenVINO ServingRuntime for Stress Detection"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: serving.kserve.io/v1alpha1
          kind: ServingRuntime
          metadata:
            name: stress-detection
            namespace: ai-edge-project
            labels:
              opendatahub.io/dashboard: "true"
            annotations:
              openshift.io/display-name: "OpenVINO Model Server"
              opendatahub.io/apiProtocol: REST
              opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
              opendatahub.io/runtime-version: v2025.4
              opendatahub.io/serving-runtime-scope: global
              opendatahub.io/template-display-name: OpenVINO Model Server
              opendatahub.io/template-name: kserve-ovms
          spec:
            multiModel: false
            protocolVersions:
              - v2
              - grpc-v2
            supportedModelFormats:
              - autoSelect: true
                name: openvino_ir
                version: opset13
              - name: onnx
                version: "1"
              - autoSelect: true
                name: tensorflow
                version: "1"
              - autoSelect: true
                name: tensorflow
                version: "2"
              - autoSelect: true
                name: paddle
                version: "2"
              - autoSelect: true
                name: pytorch
                version: "2"
            annotations:
              opendatahub.io/kserve-runtime: ovms
              prometheus.io/path: /metrics
              prometheus.io/port: "8888"
            containers:
              - name: kserve-container
                image: registry.redhat.io/rhoai/odh-openvino-model-server-rhel9@sha256:defd01ac5a37a6138de73a8f1b10c676a2efa617238049378f8bc63fb0eb00c6
                args:
                  - "--model_name={{ '{{' }}.Name{{ '}}' }}"
                  - --port=8001
                  - --rest_port=8888
                  - --model_path=/mnt/models
                  - --file_system_poll_wait_seconds=0
                  - --metrics_enable
                ports:
                  - containerPort: 8888
                    protocol: TCP
      register: r_stress_runtime

    - name: "Exercise 4.1: Deploy Stress Detection InferenceService"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: serving.kserve.io/v1beta1
          kind: InferenceService
          metadata:
            name: stress-detection
            namespace: ai-edge-project
            labels:
              opendatahub.io/dashboard: "true"
            annotations:
              openshift.io/display-name: "Stress Detection"
              openshift.io/description: ""
              serving.kserve.io/deploymentMode: RawDeployment
              security.opendatahub.io/enable-auth: "false"
              opendatahub.io/model-type: predictive
              opendatahub.io/hardware-profile-name: default-profile
              opendatahub.io/hardware-profile-namespace: redhat-ods-applications
              opendatahub.io/hardware-profile-resource-version: "{{ hw_profile_resource_version }}"
              opendatahub.io/connection-path: stress-detection
              opendatahub.io/connections: vehicle-models
          spec:
            predictor:
              minReplicas: 1
              maxReplicas: 1
              deploymentStrategy:
                type: RollingUpdate
              model:
                modelFormat:
                  name: openvino_ir
                  version: opset13
                runtime: stress-detection
                resources:
                  requests:
                    cpu: "2"
                    memory: 4Gi
                  limits:
                    cpu: "2"
                    memory: 4Gi
                storage:
                  key: vehicle-models
                  path: stress-detection
              serviceAccountName: vehicle-models-sa
      register: r_stress_deploy

    - name: "Exercise 4.1: Wait for Stress Detection model to be ready"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: serving.kserve.io/v1beta1
        kind: InferenceService
        name: stress-detection
        namespace: ai-edge-project
      register: r_stress_check
      until:
        - r_stress_check.resources | length > 0
        - r_stress_check.resources[0].status is defined
        - r_stress_check.resources[0].status.conditions is defined
        - r_stress_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0
      retries: 60
      delay: 10
      failed_when: false

    # ========================================
    # Exercise 4.2: Deploy Time to Failure model server
    # ========================================
    - name: "Exercise 4.2: Create OpenVINO ServingRuntime for Time to Failure"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: serving.kserve.io/v1alpha1
          kind: ServingRuntime
          metadata:
            name: time-to-failure
            namespace: ai-edge-project
            labels:
              opendatahub.io/dashboard: "true"
            annotations:
              openshift.io/display-name: "OpenVINO Model Server"
              opendatahub.io/apiProtocol: REST
              opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
              opendatahub.io/runtime-version: v2025.4
              opendatahub.io/serving-runtime-scope: global
              opendatahub.io/template-display-name: OpenVINO Model Server
              opendatahub.io/template-name: kserve-ovms
          spec:
            multiModel: false
            protocolVersions:
              - v2
              - grpc-v2
            supportedModelFormats:
              - autoSelect: true
                name: openvino_ir
                version: opset13
              - name: onnx
                version: "1"
              - autoSelect: true
                name: tensorflow
                version: "1"
              - autoSelect: true
                name: tensorflow
                version: "2"
              - autoSelect: true
                name: paddle
                version: "2"
              - autoSelect: true
                name: pytorch
                version: "2"
            annotations:
              opendatahub.io/kserve-runtime: ovms
              prometheus.io/path: /metrics
              prometheus.io/port: "8888"
            containers:
              - name: kserve-container
                image: registry.redhat.io/rhoai/odh-openvino-model-server-rhel9@sha256:defd01ac5a37a6138de73a8f1b10c676a2efa617238049378f8bc63fb0eb00c6
                args:
                  - "--model_name={{ '{{' }}.Name{{ '}}' }}"
                  - --port=8001
                  - --rest_port=8888
                  - --model_path=/mnt/models
                  - --file_system_poll_wait_seconds=0
                  - --metrics_enable
                ports:
                  - containerPort: 8888
                    protocol: TCP
      register: r_ttf_runtime

    - name: "Exercise 4.2: Deploy Time to Failure InferenceService"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: serving.kserve.io/v1beta1
          kind: InferenceService
          metadata:
            name: time-to-failure
            namespace: ai-edge-project
            labels:
              opendatahub.io/dashboard: "true"
            annotations:
              openshift.io/display-name: "Time to Failure"
              openshift.io/description: ""
              serving.kserve.io/deploymentMode: RawDeployment
              security.opendatahub.io/enable-auth: "false"
              opendatahub.io/model-type: predictive
              opendatahub.io/hardware-profile-name: default-profile
              opendatahub.io/hardware-profile-namespace: redhat-ods-applications
              opendatahub.io/hardware-profile-resource-version: "{{ hw_profile_resource_version }}"
              opendatahub.io/connection-path: time-to-failure
              opendatahub.io/connections: vehicle-models
          spec:
            predictor:
              minReplicas: 1
              maxReplicas: 1
              deploymentStrategy:
                type: RollingUpdate
              model:
                modelFormat:
                  name: openvino_ir
                  version: opset13
                runtime: time-to-failure
                resources:
                  requests:
                    cpu: "2"
                    memory: 4Gi
                  limits:
                    cpu: "2"
                    memory: 4Gi
                storage:
                  key: vehicle-models
                  path: time-to-failure
              serviceAccountName: vehicle-models-sa
      register: r_ttf_deploy

    - name: "Exercise 4.2: Wait for Time to Failure model to be ready"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: serving.kserve.io/v1beta1
        kind: InferenceService
        name: time-to-failure
        namespace: ai-edge-project
      register: r_ttf_check
      until:
        - r_ttf_check.resources | length > 0
        - r_ttf_check.resources[0].status is defined
        - r_ttf_check.resources[0].status.conditions is defined
        - r_ttf_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0
      retries: 60
      delay: 10
      failed_when: false

    # ========================================
    # Exercise 4.3: Query model endpoints
    # ========================================
    - name: "Exercise 4.3: ⚠️ Manual step - Query model endpoints"
      ansible.builtin.debug:
        msg: |
          ⚠️ Exercise 4.3 requires manual interaction with JupyterLab:
          - Access model-training workbench JupyterLab
          - Navigate to ai-lifecycle-edge-automation/notebooks/serving/
          - Open query_models.ipynb notebook
          - Execute cells to query both model endpoints
          This step cannot be automated.

    - name: "✅ Module 4 solve completed"
      ansible.builtin.debug:
        msg: |
          ✅ Module 4: Model serving infrastructure deployed
          Both model servers are running and ready for inference.

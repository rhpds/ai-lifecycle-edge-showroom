---
# Module 1: Transportation robot - Solve
- name: Solve Module 1
  hosts: localhost
  gather_facts: false
  vars:
    bastion_user: "{{ lookup('env', 'bastion_ssh_user_name') | default('lab-user', true) }}"
    bastion_host: "{{ lookup('env', 'bastion_public_hostname') }}"
    bastion_port: "{{ lookup('env', 'bastion_ssh_port') }}"
    bastion_password: "{{ lookup('env', 'bastion_ssh_password') }}"
    microshift_vm_ssh_key: "/home/lab-user/.ssh/microshift-001"

  tasks:
    - name: "Exercise 1.2: Create GitOps AppProject"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: AppProject
          metadata:
            name: default
            namespace: openshift-gitops
          spec:
            clusterResourceWhitelist:
              - group: '*'
                kind: '*'
            destinations:
              - namespace: '*'
                server: '*'
            sourceRepos:
              - '*'

    - name: "Exercise 1.2: Deploy MinIO using GitOps"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: minio-microshift
            namespace: openshift-gitops
          spec:
            destination:
              server: https://kubernetes.default.svc
            source:
              path: bootstrap/minio-microshift/groups/dev
              repoURL: https://github.com/rhpds/ai-lifecycle-edge-gitops.git
              targetRevision: main
            project: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    - name: "Exercise 1.2: Wait for MinIO deployment to sync"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: minio-microshift
        namespace: openshift-gitops
      register: r_minio_app
      until:
        - r_minio_app.resources | length > 0
        - r_minio_app.resources[0].status.sync.status is defined
        - r_minio_app.resources[0].status.sync.status == "Synced"
      retries: 30
      delay: 10

    - name: "Exercise 1.2: Wait for MinIO pods ready"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: minio
        label_selectors:
          - app=minio
      register: r_minio_pods
      until:
        - r_minio_pods.resources | length > 0
        - r_minio_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      retries: 30
      delay: 10

    - name: "Exercise 1.3: Deploy model serving using GitOps"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: model-server
            namespace: openshift-gitops
          spec:
            destination:
              server: https://kubernetes.default.svc
            source:
              path: bootstrap/model-server/groups/dev
              repoURL: https://github.com/rhpds/ai-lifecycle-edge-gitops.git
              targetRevision: main
            project: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    - name: "Exercise 1.3: Wait for model-server deployment to sync"
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: model-server
        namespace: openshift-gitops
      register: r_model_app
      until:
        - r_model_app.resources | length > 0
        - r_model_app.resources[0].status.sync.status is defined
        - r_model_app.resources[0].status.sync.status == "Synced"
      retries: 30
      delay: 10

    - name: "Exercise 1.3: Wait for inference pods ready"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: inference
      register: r_inference_pods
      until:
        - r_inference_pods.resources | length >= 2
        - r_inference_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length >= 2
      retries: 60
      delay: 10

    - name: "Exercise 1.4: Deploy BMS using GitOps"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: battery-simulation
            namespace: openshift-gitops
          spec:
            destination:
              server: https://kubernetes.default.svc
              namespace: battery-demo
            source:
              path: bootstrap/battery-simulation/groups/dev
              repoURL: https://github.com/rhpds/ai-lifecycle-edge-gitops.git
              targetRevision: main
              kustomize:
                patches:
                  - target:
                      kind: ConfigMap
                      name: bms-dashboard-config
                    patch: |-
                      - op: replace
                        path: /data/config.json
                        value: |
                          {
                            "BATTERY_METRICS_WS_ENDPOINT": "wss://mqtt2ws-microshift-001.{{ lookup('env', 'openshift_cluster_ingress_domain') }}/battery/metrics/",
                            "OPEN_AI_API_KEY": "my-key",
                            "STRESS_DETECTION_AI_API_ENDPOINT": "https://stress-detection-predictor-microshift-001.{{ lookup('env', 'openshift_cluster_ingress_domain') }}/",
                            "TIME_TO_FAILURE_AI_API_ENDPOINT": "https://time-to-failure-predictor-microshift-001.{{ lookup('env', 'openshift_cluster_ingress_domain') }}/",
                            "BATTERY_SIMULATION_API_ENDPOINT": "https://battery-simulation-microshift-001.{{ lookup('env', 'openshift_cluster_ingress_domain') }}/",
                            "AUTO_INFERENCE_INTERVAL_MS": 30000
                          }
            project: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    - name: "Exercise 1.4: Wait for BMS deployment to sync"
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: battery-simulation
        namespace: openshift-gitops
      register: r_bms_app
      until:
        - r_bms_app.resources | length > 0
        - r_bms_app.resources[0].status.sync.status is defined
        - r_bms_app.resources[0].status.sync.status == "Synced"
      retries: 30
      delay: 10

    - name: "Exercise 1.4: Wait for BMS pods ready"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: battery-demo
      register: r_bms_pods
      until:
        - r_bms_pods.resources | length >= 5
        - r_bms_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length >= 5
      retries: 60
      delay: 10

    - name: "Module 1 solve completed"
      ansible.builtin.debug:
        msg: "✅ Module 1: Transportation robot infrastructure deployed successfully"

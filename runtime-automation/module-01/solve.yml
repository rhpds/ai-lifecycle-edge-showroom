---
# Module 1: Transportation robot - Solve
- name: Solve Module 1
  hosts: localhost
  gather_facts: false
  vars:
    bastion_user: "{{ lookup('env', 'bastion_ssh_user_name') | default('lab-user', true) }}"
    bastion_host: "{{ lookup('env', 'bastion_public_hostname') }}"
    bastion_port: "{{ lookup('env', 'bastion_ssh_port') }}"
    bastion_password: "{{ lookup('env', 'bastion_ssh_password') }}"
    microshift_ssh_key: "/home/{{ bastion_user }}/.ssh/microshift-001"
    microshift_vm: "cloud-user@vmi/microshift"
    microshift_namespace: "microshift-001"

  tasks:
    - name: "Exercise 1.1: ⚠️ Manual step - Verify MicroShift VM"
      ansible.builtin.debug:
        msg: |
          ⚠️ Exercise 1.1 requires manual SSH to verify MicroShift:
          ssh {{ bastion_user }}@{{ bastion_host }} -p {{ bastion_port }}
          virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }}
          sudo systemctl status microshift
          This step cannot be fully automated.

    - name: "Exercise 1.2: Create GitOps AppProject in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc apply -f - <<EOF
        kind: AppProject
        apiVersion: argoproj.io/v1alpha1
        metadata:
          name: default
          namespace: openshift-gitops
        spec:
          clusterResourceWhitelist:
          - group: \"*\"
            kind: \"*\"
          destinations:
          - namespace: \"*\"
            server: \"*\"
          sourceRepos:
          - \"*\"
        EOF
        '"
      register: r_appproject
      failed_when: false

    - name: "Exercise 1.2: Deploy MinIO using GitOps in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc apply -f - <<EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: minio-microshift
          namespace: openshift-gitops
        spec:
          destination:
            server: https://kubernetes.default.svc
          source:
            path: bootstrap/minio-microshift/groups/dev
            repoURL: https://github.com/rhpds/ai-lifecycle-edge-gitops.git
            targetRevision: main
          project: default
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
        EOF
        '"
      register: r_minio_app
      failed_when: false

    - name: "Exercise 1.2: Wait for MinIO pods in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get pods -n minio --no-headers | grep -v Completed | grep Running | wc -l'"
      register: r_minio_check
      until: r_minio_check.stdout | int >= 1
      retries: 30
      delay: 10
      failed_when: false

    - name: "Exercise 1.3: Deploy model serving using GitOps in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc apply -f - <<EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: model-server
          namespace: openshift-gitops
        spec:
          destination:
            server: https://kubernetes.default.svc
          source:
            path: bootstrap/model-server/groups/dev
            repoURL: https://github.com/rhpds/ai-lifecycle-edge-gitops.git
            targetRevision: main
          project: default
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
        EOF
        '"
      register: r_model_app
      failed_when: false

    - name: "Exercise 1.3: Wait for inference pods in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get pods -n inference --no-headers | grep Running | wc -l'"
      register: r_inference_check
      until: r_inference_check.stdout | int >= 2
      retries: 60
      delay: 10
      failed_when: false

    - name: "Exercise 1.4: Deploy BMS using GitOps in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc apply -f - <<EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: battery-simulation
          namespace: openshift-gitops
        spec:
          destination:
            server: https://kubernetes.default.svc
            namespace: battery-demo
          source:
            path: bootstrap/battery-simulation/groups/dev
            repoURL: https://github.com/rhpds/ai-lifecycle-edge-gitops.git
            targetRevision: main
          project: default
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
        EOF
        '"
      register: r_bms_app
      failed_when: false

    - name: "Exercise 1.4: Wait for BMS pods in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get pods -n battery-demo --no-headers | grep Running | wc -l'"
      register: r_bms_check
      until: r_bms_check.stdout | int >= 5
      retries: 60
      delay: 10
      failed_when: false

    - name: "✅ Module 1 solve completed"
      ansible.builtin.debug:
        msg: |
          ✅ Module 1: Transportation robot infrastructure deployed successfully
          All applications deployed to MicroShift VM on edge robot.

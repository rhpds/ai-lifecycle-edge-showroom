---
# Module 1: Transportation robot - Validation
- name: Validate Module 1
  hosts: localhost
  gather_facts: false
  vars:
    bastion_user: "{{ lookup('env', 'bastion_ssh_user_name') | default('lab-user', true) }}"
    bastion_host: "{{ lookup('env', 'bastion_public_hostname') }}"
    bastion_port: "{{ lookup('env', 'bastion_ssh_port') }}"
    bastion_password: "{{ lookup('env', 'bastion_ssh_password') }}"
    microshift_ssh_key: "/home/{{ bastion_user }}/.ssh/microshift-001"
    microshift_vm: "cloud-user@vmi/microshift"
    microshift_namespace: "microshift-001"

  tasks:
    # ========================================
    # Exercise 1.1: Robot infrastructure setup
    # ========================================
    - name: "✓ Check MicroShift VM is accessible"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='hostname'"
      register: r_microshift_check
      failed_when: false

    - validation_check:
        check: "{{ r_microshift_check.rc == 0 and 'microshift' in r_microshift_check.stdout }}"
        pass_msg: "✅ MicroShift VM is accessible"
        error_msg: "❌ Cannot connect to MicroShift VM"

    - name: "⚠️ Exercise 1.1: Manual MicroShift verification"
      validation_check:
        check: false
        pass_msg: "N/A - Manual verification required"
        error_msg: |
          ⚠️ MANUAL STEP: SSH and verify MicroShift status:
            ssh {{ bastion_user }}@{{ bastion_host }} -p {{ bastion_port }}
            virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }}
            sudo systemctl status microshift
            oc get pods -A
        warning: true

    # ========================================
    # Exercise 1.2: MinIO storage deployment
    # ========================================
    - name: "✓ Check GitOps AppProject in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get appproject default -n openshift-gitops -o name 2>/dev/null || echo notfound'"
      register: r_appproject
      failed_when: false

    - validation_check:
        check: "{{ r_appproject.rc == 0 and 'appproject' in r_appproject.stdout }}"
        pass_msg: "✅ AppProject 'default' exists in MicroShift"
        error_msg: "❌ AppProject 'default' not found in openshift-gitops namespace"

    - name: "✓ Check MinIO Application in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get application minio-microshift -n openshift-gitops -o jsonpath=\"{.status.sync.status}\" 2>/dev/null || echo notfound'"
      register: r_minio_app
      failed_when: false

    - validation_check:
        check: "{{ r_minio_app.rc == 0 and 'Synced' in r_minio_app.stdout }}"
        pass_msg: "✅ MinIO Application is Synced in MicroShift"
        error_msg: "❌ MinIO Application not synced (Status: {{ r_minio_app.stdout }})"

    - name: "✓ Check MinIO pods in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get pods -n minio -l app=minio -o jsonpath=\"{.items[*].status.phase}\" 2>/dev/null || echo notfound'"
      register: r_minio_pods
      failed_when: false

    - validation_check:
        check: "{{ r_minio_pods.rc == 0 and 'Running' in r_minio_pods.stdout }}"
        pass_msg: "✅ MinIO pod is Running in MicroShift"
        error_msg: "❌ MinIO pod not ready"

    # ========================================
    # Exercise 1.3: Model serving deployment
    # ========================================
    - name: "✓ Check model-server Application in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get application model-server -n openshift-gitops -o jsonpath=\"{.status.sync.status}\" 2>/dev/null || echo notfound'"
      register: r_model_app
      failed_when: false

    - validation_check:
        check: "{{ r_model_app.rc == 0 and 'Synced' in r_model_app.stdout }}"
        pass_msg: "✅ Model-server Application is Synced in MicroShift"
        error_msg: "❌ Model-server Application not synced"

    - name: "✓ Check inference pods in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get pods -n inference --no-headers 2>/dev/null | grep Running | wc -l'"
      register: r_inference_pods
      failed_when: false

    - validation_check:
        check: "{{ r_inference_pods.rc == 0 and (r_inference_pods.stdout | int) >= 2 }}"
        pass_msg: "✅ Inference pods are Running in MicroShift ({{ r_inference_pods.stdout | default('0') }} pods)"
        error_msg: "❌ Expected at least 2 inference pods, found {{ r_inference_pods.stdout | default('0') }}"

    # ========================================
    # Exercise 1.4: Battery monitoring system
    # ========================================
    - name: "✓ Check battery-simulation Application in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get application battery-simulation -n openshift-gitops -o jsonpath=\"{.status.sync.status}\" 2>/dev/null || echo notfound'"
      register: r_bms_app
      failed_when: false

    - validation_check:
        check: "{{ r_bms_app.rc == 0 and 'Synced' in r_bms_app.stdout }}"
        pass_msg: "✅ Battery-simulation Application is Synced in MicroShift"
        error_msg: "❌ Battery-simulation Application not synced"

    - name: "✓ Check BMS pods in MicroShift"
      ansible.builtin.shell: |
        sshpass -p '{{ bastion_password }}' ssh -o StrictHostKeyChecking=no -p {{ bastion_port }} {{ bastion_user }}@{{ bastion_host }} \
        "virtctl ssh {{ microshift_vm }} -n {{ microshift_namespace }} --identity-file={{ microshift_ssh_key }} --command='oc get pods -n battery-demo --no-headers 2>/dev/null | grep Running | wc -l'"
      register: r_bms_pods
      failed_when: false

    - validation_check:
        check: "{{ r_bms_pods.rc == 0 and (r_bms_pods.stdout | int) >= 5 }}"
        pass_msg: "✅ BMS pods are Running in MicroShift ({{ r_bms_pods.stdout | default('0') }} pods)"
        error_msg: "❌ Expected at least 5 BMS pods, found {{ r_bms_pods.stdout | default('0') }}"

    - name: "✅ Module 1 validation summary"
      ansible.builtin.debug:
        msg: |
          Module 1 Validation Complete
          =============================
          ✅ MicroShift VM accessible
          ✅ GitOps infrastructure deployed
          ✅ MinIO storage operational
          ✅ Model serving running
          ✅ Battery Monitoring System active

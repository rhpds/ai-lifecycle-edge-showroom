---
# Module 5: Pipeline automation - Solve
- name: Solve Module 5
  hosts: localhost
  gather_facts: false
  vars:
    apps_domain: "{{ lookup('env', 'openshift_cluster_ingress_domain') }}"
    pipeline_url: "https://raw.githubusercontent.com/rhpds/ai-lifecycle-edge-automation/refs/heads/main/notebooks/pipelines/model-retraining.yaml"
    influxdb_url: "https://influx-db-microshift-001.{{ apps_domain }}"

  tasks:
    # ========================================
    # Exercise 5.2: Import pipeline as Argo Workflow

    # ========================================
    - name: "Exercise 5.2: Download pipeline YAML"
      ansible.builtin.uri:
        url: "{{ pipeline_url }}"
        return_content: true
      register: r_pipeline_yaml

    - name: "Exercise 5.2: Import pipeline as Argo WorkflowTemplate"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: WorkflowTemplate
          metadata:
            name: model-retraining
            namespace: ai-edge-project
            labels:
              pipelines.kubeflow.org/kfp_sdk_version: 1.8.22
          spec:
            serviceAccountName: pipeline-runner-dspa
            entrypoint: model-retraining
            arguments:
              parameters:
                - name: aws_access_key_id
                  value: "minio"
                - name: aws_s3_bucket
                  value: "inference"
                - name: aws_s3_endpoint
                  value: "http://minio-microshift-vm.microshift-001.svc.cluster.local:30000"
                - name: aws_secret_access_key
                  value: "minio123"
                - name: influxdb_bucket
                  value: "bms"
                - name: influxdb_org
                  value: "redhat"
                - name: influxdb_token
                  value: "admin_token"
                - name: influxdb_url
                  value: "{{ influxdb_url }}"
            templates:
              - name: model-retraining
                dag:
                  tasks:
                    - name: run-pipeline
                      template: kfp-launcher
                      arguments:
                        parameters:
                          - name: pipeline
                            value: "{{ r_pipeline_yaml.content | b64encode }}"
                          - name: aws_access_key_id
                            value: "{{ '{{' }}workflow.parameters.aws_access_key_id{{ '}}' }}"
                          - name: aws_s3_bucket
                            value: "{{ '{{' }}workflow.parameters.aws_s3_bucket{{ '}}' }}"
                          - name: aws_s3_endpoint
                            value: "{{ '{{' }}workflow.parameters.aws_s3_endpoint{{ '}}' }}"
                          - name: aws_secret_access_key
                            value: "{{ '{{' }}workflow.parameters.aws_secret_access_key{{ '}}' }}"
                          - name: influxdb_bucket
                            value: "{{ '{{' }}workflow.parameters.influxdb_bucket{{ '}}' }}"
                          - name: influxdb_org
                            value: "{{ '{{' }}workflow.parameters.influxdb_org{{ '}}' }}"
                          - name: influxdb_token
                            value: "{{ '{{' }}workflow.parameters.influxdb_token{{ '}}' }}"
                          - name: influxdb_url
                            value: "{{ '{{' }}workflow.parameters.influxdb_url{{ '}}' }}"
              - name: kfp-launcher
                inputs:
                  parameters:
                    - name: pipeline
                    - name: aws_access_key_id
                    - name: aws_s3_bucket
                    - name: aws_s3_endpoint
                    - name: aws_secret_access_key
                    - name: influxdb_bucket
                    - name: influxdb_org
                    - name: influxdb_token
                    - name: influxdb_url
                container:
                  image: registry.redhat.io/rhoai/odh-ml-pipelines-api-server-rhel8:v2.9
                  command:
                    - sh
                    - -c
                  args:
                    - echo "{{ '{{' }}inputs.parameters.pipeline{{ '}}' }}" | base64 -d | python3 -
                  env:
                    - name: AWS_ACCESS_KEY_ID
                      value: "{{ '{{' }}inputs.parameters.aws_access_key_id{{ '}}' }}"
                    - name: AWS_S3_BUCKET
                      value: "{{ '{{' }}inputs.parameters.aws_s3_bucket{{ '}}' }}"
                    - name: AWS_S3_ENDPOINT
                      value: "{{ '{{' }}inputs.parameters.aws_s3_endpoint{{ '}}' }}"
                    - name: AWS_SECRET_ACCESS_KEY
                      value: "{{ '{{' }}inputs.parameters.aws_secret_access_key{{ '}}' }}"
                    - name: INFLUXDB_BUCKET
                      value: "{{ '{{' }}inputs.parameters.influxdb_bucket{{ '}}' }}"
                    - name: INFLUXDB_ORG
                      value: "{{ '{{' }}inputs.parameters.influxdb_org{{ '}}' }}"
                    - name: INFLUXDB_TOKEN
                      value: "{{ '{{' }}inputs.parameters.influxdb_token{{ '}}' }}"
                    - name: INFLUXDB_URL
                      value: "{{ '{{' }}inputs.parameters.influxdb_url{{ '}}' }}"
      register: r_workflow_template

    - name: "Exercise 5.2: Create first pipeline run as Argo Workflow"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: first-run-
            namespace: ai-edge-project
            labels:
              pipelines.kubeflow.org/kfp_sdk_version: 1.8.22
          spec:
            workflowTemplateRef:
              name: model-retraining
            arguments:
              parameters:
                - name: aws_access_key_id
                  value: "minio"
                - name: aws_s3_bucket
                  value: "inference"
                - name: aws_s3_endpoint
                  value: "http://minio-microshift-vm.microshift-001.svc.cluster.local:30000"
                - name: aws_secret_access_key
                  value: "minio123"
                - name: influxdb_bucket
                  value: "bms"
                - name: influxdb_org
                  value: "redhat"
                - name: influxdb_token
                  value: "admin_token"
                - name: influxdb_url
                  value: "{{ influxdb_url }}"
      register: r_workflow_run

    # ========================================
    # Exercise 5.3: Schedule pipeline automation
    # ========================================
    - name: "Exercise 5.3: Create scheduled pipeline run as Argo CronWorkflow"
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: CronWorkflow
          metadata:
            name: scheduled-run
            namespace: ai-edge-project
            labels:
              pipelines.kubeflow.org/kfp_sdk_version: 1.8.22
          spec:
            schedule: "*/10 * * * *"
            concurrencyPolicy: "Allow"
            startingDeadlineSeconds: 0
            successfulJobsHistoryLimit: 3
            failedJobsHistoryLimit: 3
            workflowSpec:
              serviceAccountName: pipeline-runner-dspa
              workflowTemplateRef:
                name: model-retraining
              arguments:
                parameters:
                  - name: aws_access_key_id
                    value: "minio"
                  - name: aws_s3_bucket
                    value: "inference"
                  - name: aws_s3_endpoint
                    value: "http://minio-microshift-vm.microshift-001.svc.cluster.local:30000"
                  - name: aws_secret_access_key
                    value: "minio123"
                  - name: influxdb_bucket
                    value: "bms"
                  - name: influxdb_org
                    value: "redhat"
                  - name: influxdb_token
                    value: "admin_token"
                  - name: influxdb_url
                    value: "{{ influxdb_url }}"
      register: r_cronworkflow

    - name: "✅ Module 5 solve completed"
      ansible.builtin.debug:
        msg: |
          ✅ Module 5: Pipeline automation configured
          WorkflowTemplate created, first Workflow run submitted, and CronWorkflow scheduled for every 10 minutes.

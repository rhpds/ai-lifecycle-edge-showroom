---
# Module 5: Pipeline automation - Validation
- name: Validate Module 5
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "✓ Check DSPApplication exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: datasciencepipelinesapplications.opendatahub.io/v1
        kind: DataSciencePipelinesApplication
        namespace: ai-edge-project
      register: r_dsp
      failed_when: false

    # ========================================
    # Collect all check results
    # ========================================
    - name: Collect all validation results
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_dsp.resources | length > 0 }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok }}"
        pass_msg: |
          ✅ Exercise 5: Pipeline server is configured ({{ r_dsp.resources | length }} DSPApplication(s))

          ⚠️ Note: Manual steps required for:
            - Import pipeline from GitHub (bms-retraining-pipeline.yaml)
            - Execute pipeline run
            - Configure scheduled runs (every 10 minutes)
            - Monitor pipeline execution
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Exercise 5: Pipeline server is configured

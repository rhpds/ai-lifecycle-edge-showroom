---
# Module 5: Pipeline automation - Validation
- name: Validate Module 5
  hosts: localhost
  gather_facts: false
  tasks:
    # ========================================
    # Exercise 5.1: Review pipeline infrastructure
    # ========================================
    - name: "✓ Check DSPApplication exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: datasciencepipelinesapplications.opendatahub.io/v1
        kind: DataSciencePipelinesApplication
        namespace: ai-edge-project
      register: r_dsp
      failed_when: false

    - name: "✓ Check pipeline server pods are running"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: ai-edge-project
        label_selectors:
          - app=ds-pipeline-dspa
      register: r_pipeline_pods
      failed_when: false

    # ========================================
    # Exercise 5.2: Check pipeline import and run
    # ========================================
    - name: "✓ Check pipeline import jobs (created with generateName)"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Job
        namespace: ai-edge-project
      register: r_all_jobs
      failed_when: false

    - name: "✓ Filter import-pipeline jobs"
      ansible.builtin.set_fact:
        r_import_jobs: "{{ r_all_jobs.resources | selectattr('metadata.name', 'match', '^import-pipeline-job-') | list }}"

    - name: "✓ Filter first-pipeline-run jobs"
      ansible.builtin.set_fact:
        r_first_run_jobs: "{{ r_all_jobs.resources | selectattr('metadata.name', 'match', '^first-pipeline-run-job-') | list }}"

    - name: "✓ Check Workflow resources created by pipeline run"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: argoproj.io/v1alpha1
        kind: Workflow
        namespace: ai-edge-project
        label_selectors:
          - pipelines.kubeflow.org/kfp_sdk_version
      register: r_workflows
      failed_when: false

    - name: "✓ Check WorkflowTemplates auto-generated by KFP"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: argoproj.io/v1alpha1
        kind: WorkflowTemplate
        namespace: ai-edge-project
      register: r_workflow_templates
      failed_when: false

    # ========================================
    # Exercise 5.3: Check scheduled runs
    # ========================================
    - name: "✓ Check CronWorkflow for scheduled-run exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: argoproj.io/v1alpha1
        kind: CronWorkflow
        name: scheduled-run
        namespace: ai-edge-project
      register: r_cronworkflow
      failed_when: false

    # ========================================
    # Collect all check results
    # ========================================
    - name: Collect all validation results
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_dsp.resources | length > 0 }}"
        _task2_ok: "{{ (r_pipeline_pods.resources | length > 0) and (r_pipeline_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0) }}"
        _task3_ok: "{{ (r_import_jobs | length > 0) and (r_import_jobs | selectattr('status.succeeded', 'defined') | selectattr('status.succeeded', 'greaterthan', 0) | list | length > 0) }}"
        _task4_ok: "{{ (r_first_run_jobs | length > 0) and (r_first_run_jobs | selectattr('status.succeeded', 'defined') | selectattr('status.succeeded', 'greaterthan', 0) | list | length > 0) }}"
        _task5_ok: "{{ r_workflows.resources | length > 0 }}"
        _task6_ok: "{{ r_workflow_templates.resources | length > 0 }}"
        _task7_ok: "{{ r_cronworkflow.resources | length > 0 }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok and _task3_ok and _task4_ok and _task5_ok and _task6_ok and _task7_ok }}"
        pass_msg: |
          ✅ Exercise 5.1: Pipeline server is configured (DSPApplication exists)
          ✅ Exercise 5.1: Pipeline server pods are running ({{ r_pipeline_pods.resources | length }} pod(s))
          ✅ Exercise 5.2: Pipeline imported to KFP server (stored in database)
          ✅ Exercise 5.2: First pipeline run created successfully
          ✅ Exercise 5.2: Workflow resources created ({{ r_workflows.resources | length }} workflow(s))
          ✅ Exercise 5.2: WorkflowTemplates auto-generated by KFP ({{ r_workflow_templates.resources | length }} template(s))
          ✅ Exercise 5.3: scheduled-run CronWorkflow configured (every 10 minutes)

          ⚠️ Note: Manual verification recommended for:
            - Monitor workflow execution in Argo Workflows UI or RHOAI Dashboard
            - Verify models uploaded to MinIO after successful workflow runs
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Exercise 5.1: Pipeline server is configured
          {{ '✅' if _task2_ok else '❌' }} Exercise 5.1: Pipeline server pods are running
          {{ '✅' if _task3_ok else '❌' }} Exercise 5.2: Pipeline imported (found {{ r_import_jobs | length }} job(s), {{ r_import_jobs | selectattr('status.succeeded', 'defined') | selectattr('status.succeeded', 'greaterthan', 0) | list | length }} succeeded)
          {{ '✅' if _task4_ok else '❌' }} Exercise 5.2: First run created (found {{ r_first_run_jobs | length }} job(s), {{ r_first_run_jobs | selectattr('status.succeeded', 'defined') | selectattr('status.succeeded', 'greaterthan', 0) | list | length }} succeeded)
          {{ '✅' if _task5_ok else '❌' }} Exercise 5.2: Workflow resources created ({{ r_workflows.resources | length }} workflow(s))
          {{ '✅' if _task6_ok else '❌' }} Exercise 5.2: WorkflowTemplates created ({{ r_workflow_templates.resources | length }} template(s))
          {{ '✅' if _task7_ok else '❌' }} Exercise 5.3: CronWorkflow scheduled

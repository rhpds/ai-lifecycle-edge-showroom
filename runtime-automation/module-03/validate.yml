---
# Module 3: Model training - Validation
- name: Validate Module 3
  hosts: localhost
  gather_facts: false
  vars:
    apps_domain: "{{ lookup('env', 'openshift_cluster_ingress_domain') }}"

  tasks:
    # ========================================
    # Exercise 3.1: Review and access workbench
    # ========================================
    - name: "✓ Check model-training Notebook exists"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: kubeflow.org/v1
        kind: Notebook
        name: model-training
        namespace: ai-edge-project
      register: r_notebook
      failed_when: false

    - name: "✓ Check Notebook pod is running"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: ai-edge-project
        label_selectors:
          - notebook-name=model-training
      register: r_notebook_pod
      failed_when: false

    - name: "✓ Check vehicle-models DataConnection attached to workbench"
      ansible.builtin.set_fact:
        _has_vehicle_models: "{{ r_notebook.resources[0].spec.template.spec.containers[0].envFrom | default([]) | selectattr('secretRef', 'defined') | selectattr('secretRef.name', 'equalto', 'vehicle-models') | list | length > 0 }}"
      when: r_notebook.resources | length > 0
      failed_when: false

    # ========================================
    # Collect all check results
    # ========================================
    - name: Collect all validation results
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_notebook.resources | length > 0 }}"
        _task2_ok: "{{ (r_notebook_pod.resources | length > 0) and (r_notebook_pod.resources[0].status.phase | default('') == 'Running') }}"
        _task3_ok: "{{ _has_vehicle_models | default(false) }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok and _task3_ok }}"
        pass_msg: |
          ✅ Exercise 3.1: model-training Notebook exists
          ✅ Exercise 3.1: model-training pod is running
          ✅ Exercise 3.1: vehicle-models DataConnection is attached

          ⚠️ Note: Manual verification required for:
            - Exercise 3.1: Launch JupyterLab and verify access
            - Exercise 3.2: Clone Git repository (https://github.com/rhpds/ai-lifecycle-edge-automation.git)
            - Exercise 3.3: Execute training notebooks (01_retrieve-influx-data.ipynb → 07_save-models.ipynb)
            - Exercise 3.3: Verify models uploaded to MinIO (https://minio-microshift-001.{{ apps_domain }})
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Exercise 3.1: model-training Notebook exists
          {{ '✅' if _task2_ok else '❌' }} Exercise 3.1: model-training pod is running (phase: {{ r_notebook_pod.resources[0].status.phase | default('missing') if r_notebook_pod.resources | length > 0 else 'pod not found' }})
          {{ '✅' if _task3_ok else '❌' }} Exercise 3.1: vehicle-models DataConnection is attached

---
site:
  title: AI/ML Lifecycle Automation at the Edge
  url: https://github.com/rhpds/showroom_template_nookbag
  start_page: modules::index.adoc

content:
  sources:
    - url: .
      start_path: content

ui:
  bundle:
    url: https://github.com/rhpds/nookbag-bundle/releases/download/v0.0.3/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./content/supplemental-ui
    - path: ./content/lib
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"

runtime:
  cache_dir: ./.cache/antora
  fetch: true

antora:
  extensions:
    - require: ./content/lib/dev-mode.js
      enabled: false
    - require: ./content/lib/inject-buttons.js

output:
  dir: ./www
